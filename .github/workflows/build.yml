name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn kiểu build (Debug hoặc Release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # BƯỚC MỚI: Liệt kê tất cả các task hiện có để xem dự án thực sự có task gì
      - name: List all tasks
        run: ./gradlew tasks --all

      # BƯỚC BUILD: Không dùng clean, không dùng assembleDebug
      # Thay vào đó dùng lệnh build chung chung, nó sẽ tự động chạy mọi thứ
      - name: Build with Gradle
        run: ./gradlew build --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-APK
          path: '**/build/**/*.apk'
          if-no-files-found: warn
