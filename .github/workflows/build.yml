name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn kiểu build (Debug hoặc Release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Ép sử dụng Gradle 8.7 ổn định
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # FORCE BUILD: Gradle sẽ tự tìm tất cả các task khả dụng và build
      - name: Force Build with Gradle
        run: |
          echo "Bắt đầu quét và Build toàn bộ dự án..."
          ./gradlew build --stacktrace

      # AUTO UPLOAD: Tự động gom mọi file APK được tạo ra ở bất cứ thư mục nào
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-ForceBuild-APKs
          path: '**/build/**/*.apk'
