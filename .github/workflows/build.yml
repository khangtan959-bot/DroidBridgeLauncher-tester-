name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn kiểu build (Debug hoặc Release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # BƯỚC BUILD: Chạy lệnh assemble thay vì build
      - name: Build with Gradle
        run: |
          ./gradlew clean assemble${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }} --stacktrace

      # BƯỚC DEBUG: Tìm xem APK đang trốn ở đâu
      - name: Locate APKs
        run: |
          echo "Tìm kiếm các file APK trong thư mục build:"
          find . -name "*.apk"

      # BƯỚC UPLOAD: Tự động gom tất cả file .apk tìm thấy
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-APK
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: error
