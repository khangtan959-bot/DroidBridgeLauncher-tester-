name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn kiểu build (Debug hoặc Release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # BƯỚC QUAN TRỌNG: Ép sử dụng Gradle 8.7 để không bị lỗi với Gradle 9.0-milestone
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug --stacktrace
          else
            ./gradlew assembleRelease --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-${{ github.event.inputs.build_type }}
          # LƯU Ý: Nếu ở settings.gradle.kts bạn để include(":app"), thì path dưới đây để nguyên là app/build/... 
          # NẾU thư mục của bạn thực sự tên là ZalithLauncher, đổi chữ app ở dưới thành ZalithLauncher
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/**/*.apk
