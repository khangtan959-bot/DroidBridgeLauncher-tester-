name: Manual Android Build

on:
  # Thêm sự kiện này để tạo nút "Run workflow"
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn kiểu build (Debug hoặc Release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Sử dụng biến input từ người dùng để quyết định câu lệnh build
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}
          # Path này sẽ tự động lấy file tương ứng với lựa chọn
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/**/*.apk
